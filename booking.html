<section class="hero">
<div class="hero-inner">
<h1>Booking Inquiry</h1>
<p>
A little curiosity goes a long way. Share a few details below and I’ll be in touch soon to arrange something unforgettable.
</p>
</div>
</section>

<section>

<form id="booking-form">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="tel" name="phone" placeholder="Phone Number (Optional)">

<select name="service" required>
<option value="">Select Arrangement</option>
<option value="Private Introduction">Private Introduction</option>
<option value="Dinner Date">Dinner Date</option>
<option value="Overnight Experience">Overnight Experience</option>
<option value="Fly Me To You">Fly Me To You</option>
</select>

<input type="date" name="date" required>

<textarea name="message" rows="6" placeholder="Introduce yourself and provide any relevant details..." required></textarea>

<button type="submit" class="button-primary">Submit Inquiry</button>

<p id="form-status" style="margin-top:20px;"></p>

</form>

</section>
